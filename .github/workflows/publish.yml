name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check version
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view paradev version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already published. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $PUBLISHED → $CURRENT"
          fi

      - name: Run tests
        if: steps.version_check.outputs.skip == 'false'
        run: npm test || true

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version_check.outputs.current }}
        run: |
          TAG="v${VERSION}"
          # Check if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest
          else
            echo "Tag $TAG not found. Skipping GitHub Release."
            echo "To create a release, run: npm version patch/minor/major && git push --tags"
          fi
